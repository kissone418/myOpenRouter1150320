on:
  schedule:
    # cron 格式: 分 時 日 月 週 (皆為 UTC 時間)
    # 台灣 08:50 (開盤前準備) -> UTC 00:50
    - cron: "50 0 * * 1-5"
  # 2. 台灣 09:05 (開盤即時趨勢捕捉) -> UTC 01:05
    - cron: "05 1 * * 1-5"

    
    # 台灣 13:40 (收盤總結分析) -> UTC 05:40
    - cron: "40 5 * * 1-5"
  workflow_dispatch:         # 手動測試按鈕
  push:
    branches:
      - main               # 更新程式碼時自動測試
jobs:
  run-lobster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lobster
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOBSTER_PROMPT: ${{ vars.LOBSTER_PROMPT }}
          LOBSTER_MODEL: ${{ vars.LOBSTER_MODEL }}
        run: python myfmain.py
